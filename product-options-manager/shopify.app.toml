# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "37430c92bc6b67b51f11562f7426f2ec"
name = "product-options-manager"
application_url = "https://example.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

[access_scopes]
scopes = "write_products,write_metaobject_definitions,write_metaobjects,write_app_proxy,read_files,write_files"

[auth]
redirect_urls = [ "https://example.com/api/auth" ]

[app_proxy]
url = "/apps/product-options"
subpath = "product-options"
prefix = "apps"
